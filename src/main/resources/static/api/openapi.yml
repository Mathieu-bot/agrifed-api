openapi: 3.2.0
info:
  title: Federation of Agricultural Collectivities - API
  version: 1.0.0
  description:
    API for managing the Federation of Agricultural Collectivities in Madagascar.
    This file contains reusable components (schemas, parameters, responses).

components:

  parameters:
    # Pagination
    pageParam:
      name: page
      in: query
      schema:
        type: integer

    limitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20

    # Collectivity filters
    statusParam:
      name: status
      in: query
      schema:
        type: string
        enum:
          - pending
          - approved
          - rejected

    cityParam:
      name: city
      in: query
      schema:
        type: string

    # Path parameters
    collectivityIdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer

    memberIdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer

  #=================================
  # Schemas - Exception responses
  #=================================
  schemas:

    Exception:
      type: object
      properties:
        type:
          type: string
          description: Error type identifier
        message:
          type: string
          description: Human-readable error message

    BadRequestException:
      allOf:
        - $ref: '#/components/schemas/Exception'
      type: object
      properties:
        field:
          type: string
          description: Field that caused the error
      example:
        type: BadRequestException
        message: Invalid request body
        field: email

    UnauthorizedException:
      allOf:
        - $ref: '#/components/schemas/Exception'
      example:
        type: UnauthorizedException
        message: Authentication required

    NotAuthorizedException:
      allOf:
        - $ref: '#/components/schemas/Exception'
      example:
        type: NotAuthorizedException
        message: Insufficient permissions

    ResourceNotFoundException:
      allOf:
        - $ref: '#/components/schemas/Exception'
      type: object
      properties:
        resourceType:
          type: string
          description: Type of resource (e.g., Member, Collectivity)
        resourceId:
          type: integer
          description: ID of the missing resource
      example:
        type: ResourceNotFoundException
        message: Resource of type Member identified by 123 not found
        resourceType: Member
        resourceId: 123

    ConflictException:
      allOf:
        - $ref: '#/components/schemas/Exception'
      example:
        type: ConflictException
        message: Data conflict - resource already exists

    BusinessRuleViolationException:
      allOf:
        - $ref: '#/components/schemas/Exception'
      type: object
      properties:
        rule:
          type: string
          description: Business rule that was violated
        details:
          type: object
          description: Additional details about the violation
      example:
        type: BusinessRuleViolationException
        message: Business rule not respected
        rule: COLLECTIVITY_MIN_MEMBERS
        details:
          required: 10
          current: 8

    TooManyRequestsException:
      allOf:
        - $ref: '#/components/schemas/Exception'
      example:
        type: TooManyRequestsException
        message: Too many requests - please retry later

    InternalServerException:
      allOf:
        - $ref: '#/components/schemas/Exception'
      example:
        type: InternalServerException
        message: Unexpected error occurred

    Pagination:
      type: object
      properties:
        page:
          type: integer
          description: Current page number (1-based)
          default: 1
        limit:
          type: integer
          description: Number of items per page
          default: 20
        total:
          type: integer
          description: Total number of items
        totalPages:
          type: integer
          description: Total number of pages
          propertyName: total_pages

    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
        pagination:
          $ref: '#/components/schemas/Pagination'

    Federation:
      type: object
      description: Top-level organization grouping agricultural collectivities
      properties:
        id:
          type: integer
        name:
          type: string

    Position:
      type: object
      description: Role held by a member within an entity
      properties:
        id:
          type: integer
        label:
          type: string
          enum:
            - president
            - vice_president
            - treasurer
            - secretary
            - confirmed_member
            - junior_member
        context:
          type: string
          enum:
            - both
            - collectivity
            - federation

    Member:
      type: object
      description: Person who is a member of a collectivity
      properties:
        id:
          type: integer
        lastname:
          type: string
        firstname:
          type: string
        birthDate:
          type: string
          format: date
        gender:
          type: string
          enum:
            - male
            - female
        address:
          type: string
        occupation:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
        membershipDate:
          type: string
          format: date

    Collectivity:
      type: object
      description: Local agricultural collectivity affiliated to federation
      properties:
        id:
          type: integer
        number:
          type: string
        name:
          type: string
        specialty:
          type: string
        city:
          type: string
        creationDate:
          type: string
          format: date
        federationId:
          type: integer
        status:
          type: string
          enum:
            - pending
            - approved
            - rejected
          default: pending
        authorizedBy:
          type: integer
          nullable: true
        authorizationDate:
          type: string
          format: date
          nullable: true
        rejectionReason:
          type: string
          nullable: true

    CollectivityCreate:
      allOf:
        - $ref: '#/components/schemas/Collectivity'
      type: object
      required:
        - number
        - name
        - specialty
        - city
        - creationDate
        - federationId

    CollectivityUpdate:
      type: object
      properties:
        name:
          type: string
        specialty:
          type: string
        city:
          type: string

    Contribution:
      type: object
      required:
        - amount
        - collectionDate
        - paymentMethod
        - type
        - memberId
        - collectivityId
      properties:
        id:
          type: integer
        amount:
          type: number
          format: double
        collectionDate:
          type: string
          format: date
        paymentMethod:
          type: string
          enum:
            - cash
            - bank_transfer
            - mobile_money
        type:
          type: string
          enum:
            - admission
            - monthly
            - annual
            - one_time
        federationPercentage:
          type: number
          format: double
        memberId:
          type: integer
        collectivityId:
          type: integer
        specialty:
          type: string
        city:
          type: string

  responses:
    '400':
      description: Bad request - validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BadRequestException'

    '401':
      description: Unauthorized - authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UnauthorizedException'

    '403':
      description: Forbidden - insufficient permission
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NotAuthorizedException'

    '404':
      description: Not found - resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ResourceNotFoundException'

    '409':
      description: Conflict - data integrity issue
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ConflictException'

    '422':
      description: Unprocessable entity - business rule violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BusinessRuleViolationException'

    '429':
      description: Too many requests to the API
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TooManyRequestsException'

    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/InternalServerException'